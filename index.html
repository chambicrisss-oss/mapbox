<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Mapbox</title>

  <!-- MAPBOX CSS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />

  <style>
   body { 
  margin: 0; 
  padding: 0; 
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  background: #0f172a;
}

#map { 
  width: 100%; 
  height: 100vh; 
}

/* Panel lateral futurista */
#info {
  position: absolute;
  top: 0;
  right: 0;
  height: 100vh;
  width: 320px;
  color: white;
  padding: 30px 25px;
  z-index: 1;
  box-shadow: -5px 0 30px rgb(34, 36, 36);
  border-left: 2px solid rgb(16, 20, 20);
}


/* Título */
#info h3 {
  text-align: center;
  font-size: 22px;
  margin-bottom: 30px;
  color: #1c2222;
  letter-spacing: 2px;
}

/* Tarjetas de datos */
.info-card {
  background: rgb(19, 17, 17);
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 18px;
  backdrop-filter: blur(8px);
  border: 1px solid rgb(21, 24, 24);
}

.info-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 20px rgba(0,255,255);
}

.label {
  font-size: 13px;
  opacity: 0.7;
}

.value {
  font-size: 18px;
  font-weight: bold;
  margin-top: 5px;
  color: #00f5ff;
}

/* Indicador online */
.status {
  text-align: center;
  margin-top: 20px;
  font-size: 14px;
  color: #00ff99;
}

  </style>
</head>
<body>

<div id="map"></div>
<div id="info">
  <h3>📡 TRACKING EN VIVO</h3>

  <div class="info-card">
    <div class="label">Latitud</div>
    <div class="value" id="latitud">--</div>
  </div>

  <div class="info-card">
    <div class="label">Longitud</div>
    <div class="value" id="longitud">--</div>
  </div>

  <div class="info-card">
    <div class="label">Última actualización</div>
    <div class="value" id="hora">--</div>
  </div>

</div>

<!-- MAPBOX JS -->
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

<script type="module">

// IMPORTAR FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

// CONFIGURACIÓN FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCV9fZDl26hfyPDSZd6Mxw7bBATHVYGB6Y",
  authDomain: "programacionmovilmapbox.firebaseapp.com",
  databaseURL: "https://programacionmovilmapbox-default-rtdb.firebaseio.com/",
  projectId: "programacionmovilmapbox",
  storageBucket: "programacionmovilmapbox.firebasestorage.app",
  messagingSenderId: "951654593098",
  appId: "1:951654593098:web:29b3b379e635e02e746cb3"
};

//INICIALIZAR FIREBASE
const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

//TOKEN MAPBOX
mapboxgl.accessToken = "pk.eyJ1IjoiY3Jpc3RoaWFubGFpbWUiLCJhIjoiY21tY2V2ZWM1MDVnMTJ3b2huMzlocHJ6ZCJ9.dBuZjZZF2_c7fQRxnsGteg";

//CREAR MAPA
const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/streets-v12',
  center: [-68.15, -16.5],
  zoom: 15
});

// Crear elemento HTML personalizado
const el = document.createElement('div');
el.innerHTML = "🧍";
el.style.fontSize = "40px";
el.style.transform = "translate(-50%, -50%)";

// Crear marcador con ese elemento
const marker = new mapboxgl.Marker(el)
  .setLngLat([-68.15, -16.5])
  .addTo(map);
// ELEMENTOS DEL INFO
const latDiv = document.getElementById('latitud');
const lngDiv = document.getElementById('longitud');
const horaDiv = document.getElementById('hora');

// ESCUCHAR FIREBASE
const locationRef = ref(database, "ubicacion");

onValue(locationRef, (snapshot) => {
  const data = snapshot.val();

  if (data && data.latitud && data.longitud && data.timestamp) {
    const nuevaPosicion = [data.longitud, data.latitud];

    // Actualizar marcador
    marker.setLngLat(nuevaPosicion);
    map.flyTo({
      center: nuevaPosicion,
      speed: 1.5
    });

    // Mostrar latitud y longitud
    latDiv.textContent = `Latitud: ${data.latitud.toFixed(6)}`;
    lngDiv.textContent = `Longitud: ${data.longitud.toFixed(6)}`;

    // Convertir timestamp a hora legible
    const date = new Date(data.timestamp);
    const opciones = { 
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    };
    horaDiv.textContent = `Hora: ${date.toLocaleString('es-BO', opciones)}`;
  }
});

</script>

</body>
</html>
